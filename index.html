<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FieldGen">

    <link rel="manifest" href="manifest.json">

    <title>Gerador de Relatórios</title>

    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --indigo: #5856D6;
            --gray: #8E8E93;
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --indigo: #5856D6;
            --gray: #8E8E93;
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            /* Adicione estas para garantir consistência */
            --button-text: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: var(--bg);
            padding: 20px 15px;
            margin: 0;
            color: #000;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        h2 {
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.5px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 24px;
        }

        select,
        input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: #F2F2F7;
            margin-bottom: 12px;
            font-size: 16px;
            /* Evita zoom automático no iOS */
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        select:focus,
        input:focus {
            outline: none;
            background: #E5E5EA;
        }

        .input-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
            background: #FFFFFF;
            border: 1px solid #F2F2F7;
            padding: 16px;
            border-radius: 18px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .input-row div {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 10px;
            font-weight: 700;
            color: var(--gray);
            margin-bottom: 6px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="date"] {
            -webkit-appearance: none;
            /* Remove o estilo nativo do iOS */
            appearance: none;
            box-sizing: border-box;
            /* Garante que padding não aumente o tamanho */
            width: 100%;
            max-width: 100%;
            /* Força não ultrapassar o pai */
            display: block;
        }

        .input-row input {
            margin-bottom: 0;
            background: #F9F9FB;
            padding: 10px 12px;
            font-size: 15px;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        button {
            height: 48px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .btn-add {
            background: var(--success);
        }

        .btn-remove {
            background: var(--danger);
        }

        .btn-preview {
            background: var(--gray);
        }

        .btn-copy {
            background: var(--indigo);
        }

        .btn-share {
            background: #25D366;
        }

        .preview {
            background: #1C1C1E;
            color: #32D74B;
            /* Verde brilhante do iOS Dark Mode */
            padding: 20px;
            margin-top: 24px;
            border-radius: 18px;
            font-family: "SF Mono", "Menlo", monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        /* Ajuste nos botões para acomodar os ícones */
        button svg {
            width: 24px;
            height: 24px;
            fill: white;
            /* Cor do ícone */
            transition: transform 0.2s ease;
        }

        button:hover svg {
            transform: scale(1.1);
        }

        /* Melhoria na proporção dos botões */
        .actions {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 25px;
        }

        button {
            height: 54px;
            /* Botões um pouco mais altos para um toque melhor */
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Animação suave para o editor aparecer */
        #editorContainer {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Deixa a engrenagem mais elegante ao passar o mouse */
        #btnConfig svg {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #btnConfig:hover svg {
            transform: rotate(90deg);
            fill: var(--primary);
        }

        .hist-item {
            font-size: 12px;
            border-bottom: 1px solid #eee;
            padding: 8px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-delete-icon {
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .btn-delete-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--danger);
            /* Usa a cor definida no seu root */
            transition: transform 0.2s ease;
        }

        .btn-delete-icon:hover {
            background: #FFF5F5;
            /* Leve fundo avermelhado ao passar o mouse */
        }

        .btn-delete-icon:active svg {
            transform: scale(0.9);
        }


        .sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 100;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%;
            background: white;
            border-radius: 20px 20px 0 0;
            z-index: 101;
            transition: transform 0.3s ease-out;
            transform: translateY(100%);
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background: #ccc;
            margin: 10px auto;
            border-radius: 5px;
        }

        .show-sheet {
            transform: translateY(0);
        }

        /* Garanta que qualquer botão dentro da Sheet tenha um estilo padrão */
        #sheetContent button {
            background: var(--primary);
            /* Cor padrão */
            color: var(--button-text);
            padding: 12px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        #sheetContent button:active {
            opacity: 0.8;
        }

        dialog {
            border: none;
            padding: 24px;
            width: 100%;
            border-radius: 24px 24px 0 0;
            margin: 0 auto;
            position: fixed;
            bottom: 0;
            top: auto;
            background: white;
            /* Estado fechado */
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Estado aberto */
        dialog[open] {
            transform: translateY(0);
        }

        /* Backdrop */
        dialog::backdrop {
            background: rgba(0, 0, 0, 0);
            transition: background 0.3s ease;
        }

        dialog[open]::backdrop {
            background: rgba(0, 0, 0, 0.5);
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background: #ccc;
            margin: 15px auto;
            border-radius: 5px;
        }
    </style>

</head>

<body>

    <div class="card" style="position: relative;">

        <h2>📌 Gerador de Relatórios</h2>


        <select id="tipoRelatorio"></select>

        <input type="date" id="data">

        <div id="inputsContainer"></div>


        <div class="actions">

            <button class="btn-add" onclick="addRow()" title="Adicionar">
                <svg viewBox="0 0 24 24">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
            </button>

            <button class="btn-remove" onclick="removeRow()" title="Remover">
                <svg viewBox="0 0 24 24">
                    <path d="M19 13H5v-2h14v2z" />
                </svg>
            </button>

            <button class="btn-preview" onclick="build()" title="Visualizar">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                </svg>
            </button>

            <button class="btn-copy" onclick="copiar()" title="Copiar">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
                </svg>
            </button>

            <button class="btn-share" onclick="share()" title="Compartilhar">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            </button>
        </div>

        <div id="preview" class="preview">Aguardando...</div>
        <div id="historicoContainer" style="margin-top: 30px; padding: 20px; background: #fff; border-radius: 18px;">
            <h3>📜 Histórico Recente</h3>
            <div id="listaHistorico"></div>
        </div>

        <div
            style="text-align: right;margin-bottom: -20px;display: flex;justify-content: right;position: absolute;top: 10px;right: 20px;">
            <button id="btnConfig" class="btn-preview" style="width: 44px; background: none; box-shadow: none;">
                <svg viewBox="0 0 24 24" style="fill: var(--gray);">
                    <path
                        d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.81,11.69,4.81,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.5c-1.93,0-3.5-1.57-3.5-3.5 s1.57-3.5,3.5-3.5s3.5,1.57,3.5,3.5S13.93,15.5,12,15.5z" />
                </svg>
            </button>
        </div>

        <div id="editorContainer"
            style="display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0; font-size: 16px;">⚙️ Configuração</h3>
                <button onclick="toggleEditor()"
                    style="background: #E5E5EA; color: #000; width: 30px; height: 30px; border-radius: 50%; padding: 0; font-size: 14px;">✕</button>
            </div>

            <p style="font-size: 12px; color: var(--gray); margin-bottom: 10px;">Altere os templates e campos abaixo:
            </p>

            <textarea id="jsonEditor"
                style="width: 100%; height: 250px; font-family: monospace; font-size: 12px; padding: 10px; border-radius: 12px; border: 1px solid #ddd; background: #F9F9FB; box-sizing: border-box;"></textarea>

            <div id="errorLog"
                style="color: var(--danger); font-size: 12px; margin-top: 5px; min-height: 15px; font-weight: bold;">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <button class="btn-preview" onclick="toggleEditor()"
                    style="background: var(--gray); font-size: 14px;">Cancelar</button>
                <button class="btn-add" onclick="saveSettings()" style="font-size: 14px;">Salvar</button>
            </div>
        </div>

    </div>

    <dialog id="reportDialog">
        <div class="sheet-handle"></div>
        <div id="sheetContent" style="padding: 20px;"></div>
    </dialog>

    <script>
        if ('serviceWorker' in navigator) {
            // Sem a barra inicial para ser relativo ao diretório do projeto
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('PWA Service Worker registrado!'));
        }
    </script>
    <script src="app.js"></script>

</body>

</html>
