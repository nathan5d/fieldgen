<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FieldGen">

    <link rel="stylesheet" href="lib/codemirror/codemirror.css">
    <link rel="stylesheet" href="lib/codemirror/theme/dracula.css">

    <script src="lib/codemirror/codemirror.js"></script>
    <script src="lib/codemirror/mode/javascript/javascript.js"></script>
    <script src="lib/lucide/lucide.min.js"></script>
    <script src="main.js"></script>

    <link rel="manifest" href="manifest.json">
    <title>Gerador de Relatórios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="pull-indicator" class="pull-indicator">
        <div class="ios-spinner"></div>
    </div>

    <div class="card" style="position: relative;">
        <h2>📌 Gerador de Relatórios</h2>

        <select id="tipoRelatorio"></select>
        <input type="date" id="data">
        <div id="inputsContainer"></div>

        <div class="actions">
            <button class="btn-add" onclick="addRow()" title="Adicionar">
                <i data-lucide="plus"></i>
            </button>
            <button class="btn-remove" onclick="removeRow()" title="Remover">
                <i data-lucide="minus"></i>
            </button>
            <button class="btn-preview" onclick="build()" title="Visualizar">
                <i data-lucide="check"></i>
            </button>
            <button class="btn-copy" onclick="copiar()" title="Copiar">
                <i data-lucide="copy"></i>
            </button>
            <button class="btn-share" onclick="share()" title="Compartilhar">
                <i data-lucide="share"></i>
            </button>
        </div>

        <div style="position: relative; margin-top: 24px;">
            <div id="preview" class="preview">Aguardando...</div>
            <button id="btnConfig" class="btn-settings" style="position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; 
                    background: rgba(255,255,255,0.1); backdrop-filter: blur(4px); 
                    border-radius: 8px; box-shadow: none; padding: 0; color: #32D74B; opacity: 0.6;">
                <i data-lucide="settings" style="width: 16px;"></i>
            </button>
        </div>

        <div id="editorContainer" style="display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; font-size:16px;">⚙️ Configuração</h3>
                <button onclick="toggleEditor()" style="background:#E5E5EA; color:#000; width:30px; height:30px; border-radius:50%;">✕</button>
            </div>

            <div style="display:flex; gap:10px; margin:15px 0;">
                <button onclick="setConfigMode('simple')" id="btnSimple" class="btn-mode active">Modo Simples</button>
                <button onclick="setConfigMode('advanced')" id="btnAdvanced" class="btn-mode">Modo Avançado</button>
            </div>

            <div id="simpleEditor"></div>

            <div id="advancedEditor" style="display:none;">
                <div style="display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 8px; padding-right: 5px;">
                    <a href="javascript:void(0)" onclick="copiarConfigJSON()" style="color: var(--primary); font-size: 12px; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 4px;">
                        <i data-lucide="copy" style="width: 12px;"></i> Copiar Template
                    </a>
                    <a href="javascript:void(0)" onclick="colarConfigJSON()" style="color: var(--primary); font-size: 12px; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 4px;">
                        <i data-lucide="clipboard-paste" style="width: 12px;"></i> Colar Template
                    </a>
                </div>
                <textarea id="jsonEditor"></textarea>
                <div id="errorLog"></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                    <button onclick="formatarJSON()" style="background: #e1f5fe; color: #0288d1; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px;">
                        <i data-lucide="form" style="width: 16px;  margin-right: 8px;"></i> Formatar
                    </button>
                    <button onclick="resetConfig()" style="background: #ffebee; color: #d32f2f; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px;">
                        <i data-lucide="rotate-ccw" style="width: 16px;  margin-right: 8px;"></i> Resetar
                    </button>
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                <button onclick="toggleEditor()" class="btn-preview">Cancelar</button>
                <button onclick="saveSettings()" class="btn-add">Salvar</button>
            </div>
        </div>

        <div id="historicoContainer">
            <h4 style="color:var(--indigo); display: flex; justify-content: center; align-items: center;">
                <i data-lucide="history" style="margin-right: 8px; width: 20px;"></i> Histórico Recente
            </h4>
            <div id="listaHistorico"></div>
        </div>
    </div>

    <dialog id="reportDialog">
        <div class="sheet-handle"></div>
        <div id="sheetContent" style="padding: 0;"></div>
    </dialog>

    <div id="update-toast" class="update-toast" onclick="window.location.reload()">
        <div class="toast-icon">
            <i data-lucide="refresh-cw"></i>
        </div>
        <span>Nova versão disponível!</span>
    </div>

    <script>
        // Logica para Pull-to-Refresh visual (simulação sutil)
        let touchStart = 0;
        const indicator = document.getElementById('pull-indicator');

        window.addEventListener('touchstart', (e) => {
            touchStart = e.touches[0].pageY;
        }, {passive: true});

        window.addEventListener('touchmove', (e) => {
            const touchDiff = e.touches[0].pageY - touchStart;
            if (window.scrollY === 0 && touchDiff > 50) {
                indicator.style.opacity = '1';
                indicator.style.transform = `translateY(${Math.min(touchDiff / 3, 40)}px)`;
            }
        }, {passive: true});

        window.addEventListener('touchend', () => {
            indicator.style.opacity = '0';
            indicator.style.transform = `translateY(0)`;
        });

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                document.getElementById('update-toast').classList.add('show');
                            }
                        });
                    });
                });
            });

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
