<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FieldGen">


    <link rel="stylesheet" href="lib/codemirror/codemirror.css">
    <link rel="stylesheet" href="lib/codemirror/theme/dracula.css">


    <script src="lib/codemirror/codemirror.js"></script>

    <script src="lib/codemirror/mode/javascript/javascript.js"></script>
    <script src="lib/lucide/lucide.min.js"></script>
    <script src="main.js"></script>

    <link rel="manifest" href="manifest.json">

    <title>Gerador de Relatórios</title>

    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --indigo: #5856D6;
            --gray: #8E8E93;
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --indigo: #5856D6;
            --gray: #8E8E93;
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            /* Adicione estas para garantir consistência */
            --button-text: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: var(--bg);
            padding: 20px 15px;
            margin: 0;
            color: #000;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }

        h2 {
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.5px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 24px;
        }

        select,
        input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: #F2F2F7;
            margin-bottom: 12px;
            font-size: 16px;
            /* Evita zoom automático no iOS */
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        select:focus,
        input:focus {
            outline: none;
            background: #E5E5EA;
        }

        .input-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
            background: #FFFFFF;
            border: 1px solid #F2F2F7;
            padding: 16px;
            border-radius: 18px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .input-row div {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 10px;
            font-weight: 700;
            color: var(--gray);
            margin-bottom: 6px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="date"] {
            -webkit-appearance: none;
            /* Remove o estilo nativo do iOS */
            appearance: none;
            box-sizing: border-box;
            /* Garante que padding não aumente o tamanho */
            width: 100%;
            max-width: 100%;
            /* Força não ultrapassar o pai */
            display: block;
        }

        .input-row input {
            margin-bottom: 0;
            background: #F9F9FB;
            padding: 10px 12px;
            font-size: 15px;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        button {
            height: 48px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .btn-add {
            background: var(--success);
        }

        .btn-remove {
            background: var(--danger);
        }

        .btn-preview {
            background: var(--gray);
        }

        .btn-settings {
            color: #000;

            &:hover {
                color: #333;
            }
        }

        .btn-copy {
            background: var(--indigo);
        }

        .btn-share {
            background: #25D366;
        }

        .preview {
            background: #1C1C1E;
            color: #32D74B;
            /* Verde brilhante do iOS Dark Mode */
            padding: 20px;
            margin-top: 24px;
            border-radius: 18px;
            font-family: "SF Mono", "Menlo", monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
        }



        button:hover svg {
            transform: scale(1.1);
        }

        /* Melhoria na proporção dos botões */
        .actions {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 25px;
        }

        button {
            height: 54px;
            /* Botões um pouco mais altos para um toque melhor */
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Animação suave para o editor aparecer */
        #editorContainer {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Deixa a engrenagem mais elegante ao passar o mouse */
        #btnConfig svg {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #btnConfig:hover svg {
            transform: rotate(90deg);
        }

        .hist-item {
            font-size: 12px;
            border-bottom: 1px solid #eee;
            padding: 8px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-delete-icon {
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .btn-delete-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--danger);
            /* Usa a cor definida no seu root */
            transition: transform 0.2s ease;
        }

        .btn-delete-icon:hover {
            background: #FFF5F5;
            /* Leve fundo avermelhado ao passar o mouse */
        }

        .btn-delete-icon:active svg {
            transform: scale(0.9);
        }


        .sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 100;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%;
            background: white;
            border-radius: 20px 20px 0 0;
            z-index: 101;
            transition: transform 0.3s ease-out;
            transform: translateY(100%);
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background: #ccc;
            margin: 10px auto;
            border-radius: 5px;
        }

        .show-sheet {
            transform: translateY(0);
        }

        /* Garanta que qualquer botão dentro da Sheet tenha um estilo padrão */
        #sheetContent button {
            background: var(--primary);
            /* Cor padrão */
            color: var(--button-text);
            padding: 12px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        #sheetContent button:active {
            opacity: 0.8;
        }

        dialog {
            border: none;
            width: 100%;
            border-radius: 24px 24px 0 0;
            margin: 0 auto;
            position: fixed;
            bottom: 0;
            top: auto;
            background: white;
            /* Estado fechado */
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Estado aberto */
        dialog[open] {
            transform: translateY(0);
        }

        /* Backdrop */
        dialog::backdrop {
            background: rgba(0, 0, 0, 0);
            transition: background 0.3s ease;
        }

        dialog[open]::backdrop {
            background: rgba(0, 0, 0, 0.5);
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background: #ccc;
            margin: 15px auto;
            border-radius: 5px;
        }

        /* Ajusta o editor para o tema padrão */
        .CodeMirror {
            height: 300px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            font-size: 14px;
            background: #f9f9fb;
        }

        /* Garante que o scroll do editor funcione no mobile */
        .CodeMirror-scroll {
            overflow-y: auto;
            overflow-x: auto;
        }

        [data-lucide] {
            width: 20px;
        }

     

        /* Isso garante que os ícones fiquem brancos/visíveis em temas escuros */
        i {
            display: flex;
            color: currentColor;
        }

        /* Ou force a cor específica */
        .btn-add i {
            stroke: white;
        }
    </style>

</head>

<body>

    <div class="card" style="position: relative;">

        <h2>📌 Gerador de Relatórios</h2>


        <select id="tipoRelatorio"></select>

        <input type="date" id="data">

        <div id="inputsContainer"></div>


        <div class="actions">

            <button class="btn-add" onclick="addRow()" title="Adicionar">
                <i data-lucide="plus"></i>
            </button>

            <button class="btn-remove" onclick="removeRow()" title="Remover">
                <i data-lucide="minus"></i>
            </button>

            <button class="btn-preview" onclick="build()" title="Visualizar">
                <i data-lucide="check"></i>
            </button>

            <button class="btn-copy" onclick="copiar()" title="Copiar">
                <i data-lucide="copy"></i>
            </button>

            <button class="btn-share" onclick="share()" title="Compartilhar">
                <i data-lucide="share"></i>
            </button>
        </div>

        <div id="preview" class="preview">Aguardando...</div>
        <div id="historicoContainer" style="margin-top: 30px; padding: 20px; background: #fff; border-radius: 18px;">
            <h4 style="color:var(--indigo); display: flex; justify-content: center; align-items: center;"> <i
                    data-lucide="history" style="margin-right: 8px; width: 20px;"></i> Histórico Recente</h3>
                <div id="listaHistorico"></div>
        </div>

        <div
            style="text-align: right;margin-bottom: -20px;display: flex;justify-content: right;position: absolute;top: 10px;right: 20px;">
            <button id="btnConfig" class="btn-settings" style="width: 44px; background: none; box-shadow: none;">
                <i data-lucide="settings"></i>
            </button>
        </div>

        <div id="editorContainer"
            style="display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0; font-size: 16px;">⚙️ Configuração</h3>
                <button onclick="toggleEditor()"
                    style="background: #E5E5EA; color: #000; width: 30px; height: 30px; border-radius: 50%; padding: 0; font-size: 14px;">✕</button>
            </div>

            <p style="font-size: 12px; color: var(--gray); margin-bottom: 10px;">Altere os templates e campos abaixo:
            </p>

            <textarea id="jsonEditor"
                style="width: 100%; height: 250px; font-family: monospace; font-size: 12px; padding: 10px; border-radius: 12px; border: 1px solid #ddd; background: #F9F9FB; box-sizing: border-box;"></textarea>

            <div id="errorLog"
                style="color: var(--danger); font-size: 12px; margin: 5px 0; min-height: 15px; font-weight: bold;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <button onclick="formatarJSON()"
                    style="background: #e1f5fe; color: #0288d1; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px;">
                    <i data-lucide="form" style="width: 16px;  margin-right: 8px;"></i> Formatar
                </button>
                <button onclick="resetConfig()"
                    style="background: #ffebee; color: #d32f2f; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px;">
                     <i data-lucide="rotate-ccw" style="width: 16px;  margin-right: 8px;"></i>  Resetar
                </button>

                <button class="btn-preview" onclick="toggleEditor()"
                    style="grid-column: span 1; background: var(--gray); font-size: 14px;">Cancelar</button>
                <button class="btn-add" onclick="saveSettings()" style="grid-column: span 1; font-size: 14px;">
                    <i data-lucide="save" style="width: 18px;  margin-right: 8px;"></i>
                    Salvar</button>
            </div>
        </div>

    </div>

    <dialog id="reportDialog">
        <div class="sheet-handle"></div>
        <div id="sheetContent" style="padding: 0;"></div>
    </dialog>

    <script>
        if ('serviceWorker' in navigator) {
            // Sem a barra inicial para ser relativo ao diretório do projeto
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('PWA Service Worker registrado!'));
        }
    </script>
    <script src="app.js"></script>

</body>

</html>
